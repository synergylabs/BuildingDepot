services:

  mongodb:
    image: mongo:7.0
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_USERNAME: ${MONGODB_USERNAME}
      MONGO_PASSWORD: ${MONGODB_PWD}
    volumes:
      - mongo_data:/data/db
      - ./configs/init/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    # Wait until init-mongo.js has created the app user (authSource=admin matches mongoengine/pymongo)
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'mongosh --quiet "mongodb://$$MONGO_USERNAME:$$MONGO_PASSWORD@127.0.0.1:27017/admin?authSource=admin" --eval "db.runCommand({ping:1}).ok" | grep -q 1',
        ]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 20s
    networks: [bd-net]

  influxdb:
    image: influxdb:1.11
    environment:
      INFLUXDB_HTTP_AUTH_ENABLED: "true"
      INFLUXDB_DB: buildingdepot
      INFLUXDB_ADMIN_USER: ${INFLUXDB_USERNAME}
      INFLUXDB_ADMIN_PASSWORD: ${INFLUXDB_PWD}
    volumes:
      - influx_data:/var/lib/influxdb
    networks: [bd-net]

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PWD}
    volumes:
      - redis_data:/data
    networks: [bd-net]

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_ADMIN_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_ADMIN_PWD}
    ports:
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks: [bd-net]

  centralreplica:
    build: .
    command: uv run python3 buildingdepot/CentralReplica/main.py
    working_dir: /app
    environment:
      MONGODB_HOST: mongodb
      MONGODB_PORT: 27017
      MONGODB_USERNAME: ${MONGODB_USERNAME}
      MONGODB_PWD: ${MONGODB_PWD}
      REDIS_HOST: redis
      REDIS_PWD: ${REDIS_PWD}
      SECRET_KEY: ${SECRET_KEY}
      # entrypoint vars (cfg not used by CentralReplica but entrypoint still runs)
      INFLUXDB_HOST: influxdb
      INFLUXDB_USERNAME: ${INFLUXDB_USERNAME}
      INFLUXDB_PWD: ${INFLUXDB_PWD}
      RABBITMQ_ADMIN_USERNAME: ${RABBITMQ_ADMIN_USERNAME}
      RABBITMQ_ADMIN_PWD: ${RABBITMQ_ADMIN_PWD}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_started
    networks: [bd-net]

  init:
    build: .
    command: uv run python3 setup_bd.py install
    working_dir: /app
    environment:
      BD_SETTINGS: /app/configs/bd_settings.cfg
      MONGODB_HOST: mongodb
      MONGODB_PORT: 27017
      MONGODB_USERNAME: ${MONGODB_USERNAME}
      MONGODB_PWD: ${MONGODB_PWD}
      REDIS_HOST: redis
      REDIS_PWD: ${REDIS_PWD}
      SECRET_KEY: ${SECRET_KEY}
      INFLUXDB_HOST: influxdb
      INFLUXDB_USERNAME: ${INFLUXDB_USERNAME}
      INFLUXDB_PWD: ${INFLUXDB_PWD}
      RABBITMQ_ADMIN_USERNAME: ${RABBITMQ_ADMIN_USERNAME}
      RABBITMQ_ADMIN_PWD: ${RABBITMQ_ADMIN_PWD}
    depends_on:
      mongodb:
        condition: service_healthy
      influxdb:
        condition: service_started
      redis:
        condition: service_started
    restart: "no"
    networks: [bd-net]

  centralservice:
    build: .
    command: uv run gunicorn -w 4 --log-file=- -b 0.0.0.0:8081 CentralService:app
    working_dir: /app/buildingdepot
    environment:
      BD_SETTINGS: /app/configs/bd_settings.cfg
      CENTRALREPLICA_HOST: centralreplica
      MONGODB_HOST: mongodb
      MONGODB_PORT: 27017
      MONGODB_USERNAME: ${MONGODB_USERNAME}
      MONGODB_PWD: ${MONGODB_PWD}
      REDIS_HOST: redis
      REDIS_PWD: ${REDIS_PWD}
      SECRET_KEY: ${SECRET_KEY}
      INFLUXDB_HOST: influxdb
      INFLUXDB_USERNAME: ${INFLUXDB_USERNAME}
      INFLUXDB_PWD: ${INFLUXDB_PWD}
      RABBITMQ_ADMIN_USERNAME: ${RABBITMQ_ADMIN_USERNAME}
      RABBITMQ_ADMIN_PWD: ${RABBITMQ_ADMIN_PWD}
    depends_on:
      centralreplica:
        condition: service_started
      init:
        condition: service_completed_successfully
    networks: [bd-net]

  dataservice:
    build: .
    command: uv run gunicorn -w 4 --log-file=- -b 0.0.0.0:8082 DataService:app
    working_dir: /app/buildingdepot
    environment:
      BD_SETTINGS: /app/configs/bd_settings.cfg
      CENTRALREPLICA_HOST: centralreplica
      MONGODB_HOST: mongodb
      MONGODB_PORT: 27017
      MONGODB_USERNAME: ${MONGODB_USERNAME}
      MONGODB_PWD: ${MONGODB_PWD}
      REDIS_HOST: redis
      REDIS_PWD: ${REDIS_PWD}
      SECRET_KEY: ${SECRET_KEY}
      INFLUXDB_HOST: influxdb
      INFLUXDB_USERNAME: ${INFLUXDB_USERNAME}
      INFLUXDB_PWD: ${INFLUXDB_PWD}
      RABBITMQ_ADMIN_USERNAME: ${RABBITMQ_ADMIN_USERNAME}
      RABBITMQ_ADMIN_PWD: ${RABBITMQ_ADMIN_PWD}
    depends_on:
      centralreplica:
        condition: service_started
      rabbitmq:
        condition: service_started
      influxdb:
        condition: service_started
      init:
        condition: service_completed_successfully
    networks: [bd-net]

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "81:81"
      - "82:82"
    volumes:
      - ./configs/nginx_docker.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      centralservice:
        condition: service_started
      dataservice:
        condition: service_started
    networks: [bd-net]

volumes:
  mongo_data:
  influx_data:
  redis_data:
  rabbitmq_data:

networks:
  bd-net:
