server {
	listen      80;
	# Built HTML docs are not bundled in the app image; serve a minimal stub on :80.
	default_type text/plain;
	location / {
		return 200 "BuildingDepot API: Central Service on :81, Data Service on :82.\n";
	}
}

server {
    listen       81;
    add_header      Access-Control-Allow-Origin     '*';
    add_header      Access-Control-Allow-Headers    'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Charset,Authorization';
    add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE';

    access_log  off;
    error_log  /var/log/nginx/nginx-cs-error.log;

    location / {
                proxy_pass      http://centralservice:8081;
        }
}

server {
    listen       82;
    add_header      Access-Control-Allow-Origin     '*';
    add_header      Access-Control-Allow-Headers    'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Charset,Authorization';
    add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE';

    access_log  off;
    error_log  /var/log/nginx/nginx-ds-error.log;

    location / {
                proxy_pass      http://dataservice:8082;
        }
}
