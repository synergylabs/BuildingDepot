ssl_certificate	<cert_path>; 
ssl_certificate_key	<key_path>;

server {

    listen	80;
    listen 443  ssl;

    server_name	<domain>; 

    location / {

        root        /srv/buildingdepot/Documentation/build/html;
        if ( $scheme = http) {

            return 301 https://$server_name$request_uri;

        }
    }

}

server {
    listen	81;
    ssl on;

    add_header 'Access-Control-Allow-Origin' '*';
    add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE';
    add_header 'Access-Control-Allow-Headers' 'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Charset,Authorization';

    error_page 497 https://$server_name:$server_port$request_uri;

    access_log  off;
    error_log  /var/log/buildingdepot/nginx-cs-error.log;

    server_name	<domain>; 

    location / {
        proxy_pass      http://127.0.0.1:8081;
    }
}

server {
    listen       82;
    ssl on;

    keepalive_timeout 3600;             # Keep connections alive for 1 hour
    keepalive_requests 10000;           # Allow up to 10000 requests per connection
    client_body_timeout 3600;           # Longer timeouts for client body reading
    client_header_timeout 3600;         # Longer timeouts for client header reading
    send_timeout 3600;                  # Longer timeouts for sending responses
    client_max_body_size 100M;
    add_header 'Access-Control-Allow-Origin' '*';
    add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE';
    add_header 'Access-Control-Allow-Headers' 'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Charset,Authorization';

    error_page 497 https://$server_name:$server_port$request_uri;

    access_log  off;
    error_log  /var/log/buildingdepot/nginx-ds-error.log;

    server_name	<domain>;

    location / {
        proxy_pass      http://127.0.0.1:8082;
    }
}

