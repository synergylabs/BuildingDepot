# Base nginx config — installed by the deploy tooling (host.py install).
# Managed: re-installing overwrites this file (your previous one is backed up to
# nginx.conf.pre-deploy.bak). Per-app server blocks live in sites-enabled/.

user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile     on;
    tcp_nopush   on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # Websocket upgrade plumbing, shared by every site fragment. A fragment that
    # proxies websockets uses `proxy_set_header Connection $connection_upgrade;`.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Shared TLS hardening. Per-site cert paths live in each site fragment.
    include /etc/nginx/conf.d/ssl-params.conf;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Per-app site fragments (enabled by host.py enable).
    include /etc/nginx/sites-enabled/*;
}
