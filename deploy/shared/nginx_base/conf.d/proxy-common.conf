# Common reverse-proxy headers. This is a SNIPPET, not auto-loaded: the base
# nginx.conf only auto-includes ssl-params.conf. Pull it into a proxied location
# with `include /etc/nginx/conf.d/proxy-common.conf;`.

proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
