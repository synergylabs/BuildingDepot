# Permissive CORS headers for the BuildingDepot HTTP APIs. SNIPPET, not
# auto-loaded: pull it into a server/location with
# `include /etc/nginx/conf.d/cors.conf;`. Browser clients on other origins call
# CS/DS directly, so these must be present on those responses.

add_header Access-Control-Allow-Origin  '*' always;
add_header Access-Control-Allow-Headers 'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Charset,Authorization' always;
add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS, PUT, DELETE' always;
